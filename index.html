<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>Save The Date</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
    }

    body {
      background: #000;
      font-family: Arial, sans-serif;
    }

    .card {
      width: 100%;
      min-height: 100vh;
      min-height: 100dvh;
      position: relative;
      overflow: hidden;
      background: url("angkor.png") center center / cover no-repeat;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(255, 170, 110, 0.10) 0%,
        rgba(0, 0, 0, 0.03) 35%,
        rgba(0, 0, 0, 0.10) 100%
      );
      z-index: 1;
    }

    .flower-top-left,
    .flower-top-right,
    .flower-bottom-left,
    .flower-bottom-right {
      position: absolute;
      z-index: 3;
      pointer-events: none;
    }

    .flower-top-left {
      top: 0;
      left: 0;
      width: 118px;
    }

    .flower-top-right {
      top: 0;
      right: 0;
      width: 118px;
    }

    .flower-bottom-left {
      bottom: 0;
      left: 0;
      width: 118px;
    }

    .flower-bottom-right {
      bottom: 0;
      right: 0;
      width: 118px;
    }

    .content {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      text-align: center;
      color: white;
      padding: 60px 16px 24px;
    }

    .hero-text {
      width: 100%;
    }

    .title {
      font-size: 28px;
      font-weight: 400;
      margin-bottom: 24px;
      color: #fff;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.14);
    }

    .subtitle {
      font-size: 10px;
      letter-spacing: 2px;
      margin-bottom: 10px;
      color: #f8f4ef;
      text-transform: uppercase;
      font-weight: 600;
    }

    .names {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 18px;
      color: #fff;
      line-height: 1.2;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.14);
    }

    .date {
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 4px;
      color: #fff;
    }

    .location {
      font-size: 11px;
      font-weight: 600;
      color: #fff;
      line-height: 1.35;
    }

    .spacer-top {
      flex: 1;
    }

    .couple-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: -40px;
      margin-bottom: 18px;
    }

    /* Flower frame around couple image */
    .photo-frame {
      position: relative;
      width: 260px;
      height: 320px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .photo-box {
      width: 210px;
      height: 270px;
      background: rgba(255, 255, 255, 0.15);
      border: 3px solid rgba(255, 255, 255, 0.75);
      border-radius: 140px 140px 24px 24px;
      padding: 10px;
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.22);
      overflow: hidden;
      position: relative;
      z-index: 2;
    }

    .couple {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      border-radius: 130px 130px 18px 18px;
    }

    .frame-flower {
      position: absolute;
      z-index: 3;
      pointer-events: none;
      filter: drop-shadow(0 6px 10px rgba(0, 0, 0, 0.18));
    }

    .frame-top-left {
      top: -12px;
      left: -12px;
      width: 95px;
      transform: rotate(-8deg);
    }

    .frame-top-right {
      top: -12px;
      right: -12px;
      width: 95px;
      transform: scaleX(-1) rotate(-8deg);
    }

    .frame-bottom-left {
      bottom: -10px;
      left: -10px;
      width: 90px;
      transform: rotate(8deg);
    }

    .frame-bottom-right {
      bottom: -10px;
      right: -10px;
      width: 90px;
      transform: scaleX(-1) rotate(8deg);
    }

    .btn {
      display: inline-block;
      background: #d89b00;
      color: white;
      padding: 14px 30px;
      border-radius: 30px;
      text-decoration: none;
      font-size: 15px;
      font-weight: 700;
      transition: 0.3s ease;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.18);
      margin-bottom: 10px;
    }

    .btn:hover {
      background: #b67f00;
      transform: translateY(-2px) scale(1.02);
    }

    @media (min-width: 431px) {
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        background: #cfcfcf;
        min-height: 100vh;
      }

      .card {
        max-width: 430px;
        min-height: 100vh;
        min-height: 100dvh;
      }
    }

    @media (max-width: 480px) {
      .content {
        padding: 52px 14px 20px;
      }

      .title {
        font-size: 25px;
        margin-bottom: 22px;
      }

      .subtitle {
        font-size: 10px;
        letter-spacing: 1.8px;
      }

      .names {
        font-size: 20px;
      }

      .date,
      .location {
        font-size: 10px;
      }

      .flower-top-left,
      .flower-top-right,
      .flower-bottom-left,
      .flower-bottom-right {
        width: 102px;
      }

      .couple-wrap {
        margin-top: -30px;
        margin-bottom: 16px;
      }

      .photo-frame {
        width: 220px;
        height: 280px;
      }

      .photo-box {
        width: 180px;
        height: 235px;
      }

      .frame-top-left,
      .frame-top-right {
        width: 82px;
      }

      .frame-bottom-left,
      .frame-bottom-right {
        width: 78px;
      }

      .btn {
        font-size: 16px;
        padding: 13px 28px;
      }
    }

    @media (max-width: 375px) {
      .content {
        padding: 46px 12px 18px;
      }

      .title {
        font-size: 23px;
      }

      .names {
        font-size: 18px;
      }

      .couple-wrap {
        margin-top: -60px;
      }

      .photo-frame {
        width: 200px;
        height: 255px;
      }

      .photo-box {
        width: 165px;
        height: 215px;
      }

      .frame-top-left,
      .frame-top-right {
        width: 74px;
      }

      .frame-bottom-left,
      .frame-bottom-right {
        width: 70px;
      }

      .btn {
        font-size: 13px;
        padding: 12px 24px;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="flower_1.png" class="flower-top-left" alt="" />
    <img src="flower_3.png" class="flower-top-right" alt="" />
    <img src="flower_2.png" class="flower-bottom-left" alt="" />
    <img src="flower_4.png" class="flower-bottom-right" alt="" />

    <div class="content">
      <div class="hero-text">
        <h1 class="title">Save the Date</h1>
        <p class="subtitle">TO OUR CEREMONY</p>

        <div class="names">ANDREW &amp; JESSICA</div>

        <div class="date">DECEMBER 15, 2027</div>
        <div class="location">MIAMI BEACH, FLORIDA</div>
      </div>

      <div class="spacer-top"></div>

      <div class="couple-wrap">
        <div class="photo-frame">
            <img src="flower_1.png" class="flower-top-left" alt="" />
    <img src="flower_3.png" class="flower-top-right" alt="" />
    <img src="flower_2.png" class="flower-bottom-left" alt="" />
    <img src="flower_4.png" class="flower-bottom-right" alt="" />

          <div class="photo-box">
            <img src="profile_3.png" class="couple" alt="Couple" />
          </div>
        </div>
      </div>

      <a href="details.html" class="btn">View Wedding Details</a>
    </div>
  </div>
</body>
</html>
